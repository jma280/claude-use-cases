<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labor Timeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 1.5rem; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 0.5rem; }
  .reload-note { font-size: 12px; color: #b45309; background: #fffbeb; border: 0.5px solid #fcd34d; border-radius: 6px; padding: 6px 10px; margin-bottom: 1.25rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.75rem 1rem; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 1px; background: #ddd; }
  .day-group { margin-bottom: 2rem; }
  .day-label { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-left: 4px; }
  .event { position: relative; margin-bottom: 12px; }
  .event-dot { position: absolute; left: -24px; top: 14px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; background: #aaa; flex-shrink: 0; }
  .event-card { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.75rem 1rem; }
  .event-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .event-title { font-size: 14px; font-weight: 500; flex: 1; }
  .event-time { font-size: 11px; color: #999; white-space: nowrap; flex-shrink: 0; }
  .event-detail { font-size: 12px; color: #666; line-height: 1.5; }
  .event-flag { display: inline-block; font-size: 10px; font-weight: 500; background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 4px; margin-top: 6px; }
  .cat-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; margin-bottom: 4px; }
  .empty { font-size: 14px; color: #999; padding: 1rem 0; }
  .export-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
  .btn { padding: 7px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: #f0f0f0; }
  @media (max-width: 500px) { .stats { grid-template-columns: repeat(3, 1fr); } .stat-value { font-size: 18px; } }
</style>
</head>
<body>
<h1>Labor Timeline</h1>
<p class="subtitle">Updated by Claude — refresh after each update.</p>
<div class="reload-note">Claude updates <code>labor_timeline_data.json</code> directly. Hit Cmd+R to refresh after any update.</div>
<div class="stats">
  <div class="stat"><div class="stat-label">Total events</div><div class="stat-value" id="total-events">—</div></div>
  <div class="stat"><div class="stat-label">Time in labor</div><div class="stat-value" id="elapsed">—</div><div class="stat-sub" id="elapsed-since">since labor start</div></div>
  <div class="stat"><div class="stat-label">Flagged items</div><div class="stat-value" id="flagged">—</div></div>
</div>
<div class="legend" id="legend"></div>
<div class="timeline" id="timeline"><div class="empty">Loading…</div></div>
<div class="export-row"><button class="btn" onclick="exportText()">Export text</button></div>
<script>
let events=[],categories={},laborStart=null;
function todayStr(){return new Date().toISOString().slice(0,10);}
function formatDate(dateStr){if(!dateStr)return'Unknown';if(dateStr===todayStr())return'Today';const d=new Date(dateStr+'T00:00:00');return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});}
function elapsedSince(startDt){if(!startDt)return'—';const diffMs=new Date()-startDt;if(diffMs<0)return'—';const hrs=Math.floor(diffMs/3600000);const mins=Math.floor((diffMs%3600000)/60000);if(hrs===0)return`${mins}m`;return`${hrs}h ${mins}m`;}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',');}
function renderLegend(){document.getElementById('legend').innerHTML=Object.entries(categories).map(([k,cat])=>`<div class="legend-item"><span class="legend-dot" style="background:${cat.color}"></span>${cat.label}</div>`).join('');}
function updateElapsed(){if(laborStart)document.getElementById('elapsed').textContent=elapsedSince(laborStart);}
function render(){document.getElementById('total-events').textContent=events.length;document.getElementById('flagged').textContent=events.filter(e=>e.flag).length;updateElapsed();renderLegend();const timeline=document.getElementById('timeline');if(!events.length){timeline.innerHTML='<div class="empty">No events logged yet.</div>';return;}const byDate={};events.forEach(e=>{const d=e.date||'Unknown';if(!byDate[d])byDate[d]=[];byDate[d].push(e);});timeline.innerHTML=Object.entries(byDate).map(([date,dayEvents])=>{const rows=dayEvents.map(e=>{const cat=categories[e.category]||{label:e.category,color:'#aaa'};const rgb=hexToRgb(cat.color);const flagHtml=e.flag?`<div class="event-flag">Flagged for bill review</div>`:'';return`<div class="event"><div class="event-dot" style="background:${cat.color};box-shadow:0 0 0 3px rgba(${rgb},0.15);"></div><div class="event-card"><div><span class="cat-badge" style="background:rgba(${rgb},0.12);color:${cat.color};">${cat.label}</span></div><div class="event-header"><div class="event-title">${e.title}</div><div class="event-time">${e.time||'—'}</div></div>${e.detail?`<div class="event-detail">${e.detail}</div>`:''}${flagHtml}</div></div>`;}).join('');return`<div class="day-group"><div class="day-label">${formatDate(date)}</div>${rows}</div>`;}).join('');}
function exportText(){const lines=['LABOR TIMELINE','Generated: '+new Date().toLocaleString(),'='.repeat(50),''];const byDate={};events.forEach(e=>{const d=e.date||'Unknown';if(!byDate[d])byDate[d]=[];byDate[d].push(e);});Object.entries(byDate).forEach(([date,dayEvents])=>{lines.push(formatDate(date).toUpperCase());lines.push('-'.repeat(30));dayEvents.forEach(e=>{const cat=categories[e.category]?.label||e.category;lines.push(`  [${e.time||'?'}] ${cat.toUpperCase()} — ${e.title}`);if(e.detail)lines.push(`     ${e.detail}`);if(e.flag)lines.push(`     *** FLAGGED FOR BILL REVIEW ***`);});lines.push('');});lines.push('='.repeat(50));lines.push(`Total events: ${events.length} | Flagged: ${events.filter(e=>e.flag).length}`);if(laborStart)lines.push(`Time in labor at export: ${elapsedSince(laborStart)}`);const blob=new Blob([lines.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='labor-timeline.txt';a.click();}
fetch('labor_timeline_data.json').then(r=>r.json()).then(data=>{events=data.events||[];categories=data.categories||{};if(data.start_date&&data.start_time){laborStart=new Date(`${data.start_date}T${data.start_time}:00`);document.getElementById('elapsed-since').textContent=`since ${data.start_time.replace(/^0/,'')} — labor start`;}else if(data.start_date){laborStart=new Date(data.start_date+'T00:00:00');}render();setInterval(updateElapsed,60000);}).catch(()=>{document.getElementById('timeline').innerHTML='<div class="empty">Could not load labor_timeline_data.json. Make sure both files are in the same folder and opened via a local server.</div>';});
</script>
</body>
</html>
